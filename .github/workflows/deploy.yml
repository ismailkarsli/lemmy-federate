name: build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: |
          pnpm install --frozen-lockfile
          pnpm run db:generate
      - run: pnpm run check

  deploy:
    if: 0 && github.ref_name == github.event.repository.default_branch
    runs-on: lemy
    needs: [build_push, test]
    steps:
      - run: |
          docker pull ${{ env.DOCKER_IMAGE }}
          if [ "$(docker ps -aq -f name=lemmy-federate)" ]; then
            docker stop lemmy-federate
            docker rm lemmy-federate
          fi
          docker run \
            -e APP_URL -e BLACKLISTED_INSTANCES -e SECRET_KEY -e MASTER_KEY -e DATABASE_URL -e REDIS_URL \
            --name lemmy-federate --detach -p 52312:3000 --restart on-failure --network lemylol_default \
            $DOCKER_IMAGE
        env:
          APP_URL: ${{ vars.APP_URL }}
          BLACKLISTED_INSTANCES: ${{ vars.BLACKLISTED_INSTANCES }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
